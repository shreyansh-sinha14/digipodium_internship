<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h2 {
            color: blue;
            font-size: 20px;
            text-decoration: underline wavy red;
        }
        .text{
            color:aquamarine;
            background-color: black;
            font-size: 18px;
            border: 2px solid black;
        }
        #myText{
            color: coral;
            background-color: black;
            font-size: 16px;
            border: 2px dashed black;
        }
        #byeBye{
            color: crimson;
            background-color: whitesmoke;
            font-size: 20px;
            border: 2px dotted black;
        }
    </style>
</head>
<body>
    <h1 style="color: greenyellow; font-size: 24px;">Hello, World!</h1>
    <h2 class="text"> Name selector is used to select elements by their tag name </h2>

    <p class="text">Class selector is used to select elements by their class name</p>
    <p id="myText">Id selector is used to select elements by thier id name</p>

    <h3 class="text" id="byeBye">Priority decided for tag class and id</h3>

    <button class="btn">Click Me</button>


</body>
</html>
